<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>お助け計算アプリ</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; padding-bottom: 400px; }
        .active-tab { border-bottom: 4px solid #ef4444; color: #ef4444; }
        .cheapest { color: #ef4444; font-weight: bold; border: 2px solid #ef4444 !important; }
        input:focus { outline: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <nav class="flex bg-white shadow-sm sticky top-0 z-10">
        <button onclick="switchTab('price')" id="tab-price" class="flex-1 py-4 text-center font-bold active-tab">単価比較</button>
        <button onclick="switchTab('recipe')" id="tab-recipe" class="flex-1 py-4 text-center font-bold">何倍量？計算</button>
    </nav>

    <div class="p-4 max-w-md mx-auto">
        
        <section id="section-price">
            <h2 class="text-lg font-bold mb-4 text-center text-gray-600">どれが一番安い？</h2>
            <form onsubmit="return false;">
                <div id="price-container"></div>
                <button type="button" onclick="addPriceCard()" class="w-full py-3 bg-gray-200 rounded-xl font-bold text-gray-600 mb-4">+ 比較対象を追加</button>
            </form>
        </section>

        <section id="section-recipe" class="hidden">
            <h2 class="text-lg font-bold mb-4 text-center text-gray-600">レシピの何倍で作る？</h2>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <form onsubmit="return false;">
                    <div class="mb-4 text-xs text-gray-400">「レシピ量」と「今使いたい量」で倍率を算出します。</div>
                    
                    <div class="flex items-center gap-2 mb-6">
                        <div class="flex-1 text-center">
                            <label class="block text-xs text-gray-400 mb-1">レシピ量</label>
                            <input type="number" id="recipe-val" inputmode="decimal" class="w-full border-b-2 py-2 text-xl text-center focus:border-red-400 transition-colors" oninput="calcAllOtherRecipes()" placeholder="100">
                        </div>
                        <div class="text-xl pt-4 text-gray-400">→</div>
                        <div class="flex-1 text-center">
                            <label class="block text-xs text-red-400 font-bold mb-1">使いたい量</label>
                            <input type="number" id="actual-val" inputmode="decimal" class="w-full border-b-2 border-red-400 py-2 text-xl text-center" oninput="calcAllOtherRecipes()" placeholder="150">
                        </div>
                    </div>

                    <div id="multiplier-display" class="text-center bg-red-50 py-3 rounded-lg text-red-600 font-bold mb-6 hidden">
                        レシピの <span id="multiplier-num">1.0</span> 倍で作る
                    </div>

                    <hr class="mb-6">

                    <label class="block text-xs text-gray-400 mb-3 font-bold">他の調味料を合わせる</label>
                    <div id="other-recipes-container" class="space-y-3 mb-4">
                        </div>
                    
                    <button type="button" onclick="addOtherRecipeField()" class="w-full py-3 bg-gray-100 rounded-xl font-bold text-gray-500 hover:bg-gray-200 transition-colors">
                        + 調味料の入力欄を追加
                    </button>
                </form>
            </div>
        </section>
    </div>

    <script>
        window.onload = () => {
            for(let i=0; i<3; i++) addPriceCard();
            addOtherRecipeField(); // 初期フォーム1つ
        };

        function switchTab(tab) {
            document.getElementById('section-price').classList.toggle('hidden', tab !== 'price');
            document.getElementById('section-recipe').classList.toggle('hidden', tab !== 'recipe');
            document.getElementById('tab-price').classList.toggle('active-tab', tab === 'price');
            document.getElementById('tab-recipe').classList.toggle('active-tab', tab === 'recipe');
        }

        // --- 単価比較ロジック ---
        function addPriceCard() {
            const container = document.getElementById('price-container');
            const div = document.createElement('div');
            div.className = 'price-card bg-white p-4 rounded-xl shadow-sm mb-4 border border-gray-200';
            div.innerHTML = `
                <div class="flex gap-2">
                    <div class="flex-1">
                        <label class="block text-xs text-gray-400">金額 (円)</label>
                        <input type="number" inputmode="decimal" class="price-val w-full border-b-2 border-gray-200 py-2 text-xl focus:border-red-400 transition-colors" oninput="calculateCheapest()">
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs text-gray-400">容量 (g/ml)</label>
                        <input type="number" inputmode="decimal" class="unit-val w-full border-b-2 border-gray-200 py-2 text-xl focus:border-red-400 transition-colors" oninput="calculateCheapest()">
                    </div>
                </div>
                <div class="result-text text-sm mt-2 text-right text-gray-500 min-h-[1.25rem]"></div>
            `;
            container.appendChild(div);
        }

        function calculateCheapest() {
            const cards = document.querySelectorAll('.price-card');
            let minUnitPrice = Infinity;
            let cheapestIndex = -1;
            cards.forEach((card, index) => {
                const p = parseFloat(card.querySelector('.price-val').value);
                const u = parseFloat(card.querySelector('.unit-val').value);
                const res = card.querySelector('.result-text');
                card.classList.remove('cheapest');
                if (p && u) {
                    const up = p / u;
                    res.innerText = `1単位: ${up.toFixed(2)} 円`;
                    if (up < minUnitPrice) { minUnitPrice = up; cheapestIndex = index; }
                } else { res.innerText = ''; }
            });
            if (cheapestIndex !== -1) cards[cheapestIndex].classList.add('cheapest');
        }

        // --- 調味料計算ロジック ---
        function addOtherRecipeField() {
            const container = document.getElementById('other-recipes-container');
            const div = document.createElement('div');
            div.className = "flex items-center gap-2 animate-fadeIn";
            // w-24で入力幅を制限し、結果側(other-res)にtruncate(省略)を適用してはみ出しを防ぎます
            div.innerHTML = `
                <input type="number" inputmode="decimal" class="other-input w-24 border-b-2 py-2 text-lg text-center focus:border-red-400 transition-colors" placeholder="レシピ" onfocus="handleOtherFocus(this)" oninput="calcAllOtherRecipes()">
                <span class="text-lg text-gray-400 flex-shrink-0">→</span>
                <div class="other-res flex-1 bg-gray-50 border border-gray-100 py-2 px-2 text-lg text-center font-bold rounded text-gray-600 overflow-hidden text-ellipsis whitespace-nowrap">-</div>
            `;
            container.appendChild(div);
        }

        function handleOtherFocus(inputElem) {
            const allInputs = document.querySelectorAll('.other-input');
            // アクティブになったのが一番最後のフォームなら、裏で自動的に次のフォームを追加する
            // これによりスマホのキーボードで常に「次へ」が活性化されます
            if (inputElem === allInputs[allInputs.length - 1]) {
                addOtherRecipeField();
            }
        }

        function calcAllOtherRecipes() {
            const rV = parseFloat(document.getElementById('recipe-val').value);
            const aV = parseFloat(document.getElementById('actual-val').value);
            const display = document.getElementById('multiplier-display');
            const mNum = document.getElementById('multiplier-num');
            
            if (rV && aV) {
                const multiplier = aV / rV;
                display.classList.remove('hidden');
                mNum.innerText = multiplier.toFixed(2);

                document.querySelectorAll('#other-recipes-container > div').forEach(row => {
                    const input = row.querySelector('.other-input');
                    const resDiv = row.querySelector('.other-res');
                    const val = parseFloat(input.value);
                    if (val) {
                        resDiv.innerText = (val * multiplier).toFixed(1);
                        resDiv.classList.add('text-red-500');
                    } else {
                        resDiv.innerText = '-';
                        resDiv.classList.remove('text-red-500');
                    }
                });
            } else {
                display.classList.add('hidden');
                document.querySelectorAll('.other-res').forEach(el => el.innerText = '-');
            }
        }
    </script>
</body>
</html>
