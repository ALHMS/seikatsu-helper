<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>お助け計算アプリ</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; padding-bottom: 300px; }
        .active-tab { border-bottom: 4px solid #ef4444; color: #ef4444; }
        .cheapest { color: #ef4444; font-weight: bold; border: 2px solid #ef4444 !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <nav class="flex bg-white shadow-sm sticky top-0 z-10">
        <button onclick="switchTab('price')" id="tab-price" class="flex-1 py-4 text-center font-bold active-tab">単価比較</button>
        <button onclick="switchTab('recipe')" id="tab-recipe" class="flex-1 py-4 text-center font-bold">何倍量？計算</button>
    </nav>

    <div class="p-4 max-w-md mx-auto">
        
        <section id="section-price">
            <h2 class="text-lg font-bold mb-4 text-center text-gray-600">どれが一番安い？</h2>
            <div id="price-container">
                </div>
            <button onclick="addPriceCard()" class="w-full py-3 bg-gray-200 rounded-xl font-bold text-gray-600 mb-4">+ 比較対象をさらに追加</button>
        </section>

        <section id="section-recipe" class="hidden">
            <h2 class="text-lg font-bold mb-4 text-center text-gray-600">レシピの何倍で作る？</h2>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div class="mb-4 text-xs text-gray-400">
                    「レシピ通りの分量」と「今使いたい分量」を入力してください。
                </div>
                
                <div class="space-y-6">
                    <div class="flex items-center gap-2">
                        <div class="flex-1">
                            <label class="block text-xs text-gray-400">レシピの量</label>
                            <input type="number" id="recipe-val" inputmode="decimal" class="w-full border-b-2 py-2 text-xl outline-none focus:border-red-400" oninput="calcMultiplier()" placeholder="例: 100">
                        </div>
                        <div class="text-xl pt-4">→</div>
                        <div class="flex-1">
                            <label class="block text-xs text-red-400 font-bold">使いたい量</label>
                            <input type="number" id="actual-val" inputmode="decimal" class="w-full border-b-2 border-red-400 py-2 text-xl outline-none" oninput="calcMultiplier()" placeholder="例: 150">
                        </div>
                    </div>

                    <div id="multiplier-display" class="text-center bg-red-50 py-3 rounded-lg text-red-600 font-bold hidden">
                        レシピの <span id="multiplier-num">1.0</span> 倍で作ります
                    </div>

                    <hr>

                    <div>
                        <label class="block text-xs text-gray-400 mb-2">他の調味料を合わせる</label>
                        <div class="flex items-center gap-4">
                            <input type="number" id="other-recipe-val" inputmode="decimal" class="flex-1 border-b-2 py-2 text-xl outline-none" oninput="calcMultiplier()" placeholder="他のレシピ分量">
                            <div class="text-xl">→</div>
                            <div class="flex-1 bg-gray-100 py-2 text-xl text-center font-bold rounded" id="other-result">
                                -
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        // 初期起動時に3つカードを作成
        window.onload = () => {
            for(let i=0; i<3; i++) addPriceCard();
        };

        function switchTab(tab) {
            document.getElementById('section-price').classList.toggle('hidden', tab !== 'price');
            document.getElementById('section-recipe').classList.toggle('hidden', tab !== 'recipe');
            document.getElementById('tab-price').classList.toggle('active-tab', tab === 'price');
            document.getElementById('tab-recipe').classList.toggle('active-tab', tab === 'recipe');
        }

        // --- 単価比較 ---
        function addPriceCard() {
            const container = document.getElementById('price-container');
            const div = document.createElement('div');
            div.className = 'price-card bg-white p-4 rounded-xl shadow-sm mb-4 border border-gray-200';
            div.innerHTML = `
                <div class="flex gap-2">
                    <div class="flex-1">
                        <label class="block text-xs text-gray-400">金額 (円)</label>
                        <input type="number" inputmode="decimal" class="price-val w-full border-b-2 border-gray-200 py-2 text-xl focus:border-red-400 outline-none" oninput="calculateCheapest()">
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs text-gray-400">容量 (g/ml)</label>
                        <input type="number" inputmode="decimal" class="unit-val w-full border-b-2 border-gray-200 py-2 text-xl focus:border-red-400 outline-none" oninput="calculateCheapest()">
                    </div>
                </div>
                <div class="result-text text-sm mt-2 text-right text-gray-500 min-h-[1.25rem]"></div>
            `;
            container.appendChild(div);
        }

        function calculateCheapest() {
            const cards = document.querySelectorAll('.price-card');
            let minUnitPrice = Infinity;
            let cheapestIndex = -1;

            cards.forEach((card, index) => {
                const price = parseFloat(card.querySelector('.price-val').value);
                const unit = parseFloat(card.querySelector('.unit-val').value);
                const resultText = card.querySelector('.result-text');
                card.classList.remove('cheapest');

                if (price && unit) {
                    const unitPrice = price / unit;
                    resultText.innerText = `1単位: ${unitPrice.toFixed(2)} 円`;
                    if (unitPrice < minUnitPrice) {
                        minUnitPrice = unitPrice;
                        cheapestIndex = index;
                    }
                } else {
                    resultText.innerText = '';
                }
            });

            if (cheapestIndex !== -1) {
                cards[cheapestIndex].classList.add('cheapest');
            }
        }

        // --- 調味料計算（倍率） ---
        function calcMultiplier() {
            const recipeVal = parseFloat(document.getElementById('recipe-val').value);
            const actualVal = parseFloat(document.getElementById('actual-val').value);
            const display = document.getElementById('multiplier-display');
            const multiplierNum = document.getElementById('multiplier-num');
            
            if (recipeVal && actualVal) {
                const multiplier = actualVal / recipeVal;
                display.classList.remove('hidden');
                multiplierNum.innerText = multiplier.toFixed(2);

                // 他の調味料の計算
                const otherRecipe = parseFloat(document.getElementById('other-recipe-val').value);
                if (otherRecipe) {
                    document.getElementById('other-result').innerText = (otherRecipe * multiplier).toFixed(1);
                } else {
                    document.getElementById('other-result').innerText = '-';
                }
            } else {
                display.classList.add('hidden');
                document.getElementById('other-result').innerText = '-';
            }
        }
    </script>
</body>
</html>
